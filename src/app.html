<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var path = window.location.pathname || "";
          var siteThemeMeta = document.querySelector(
            'meta[name="site-theme-default"]'
          );
          var siteTheme = siteThemeMeta
            ? siteThemeMeta.getAttribute("content")
            : null;
          if (
            siteTheme !== "light" &&
            siteTheme !== "dark" &&
            siteTheme !== "system"
          ) {
            siteTheme = "system";
          }

          var theme = siteTheme;
          if (path.startsWith("/admin/")) {
            var adminTheme = localStorage.getItem("admin-theme");
            if (
              adminTheme === "light" ||
              adminTheme === "dark" ||
              adminTheme === "system"
            ) {
              theme = adminTheme;
            }
          }

          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var activeTheme = isDark ? "dark" : "light";
          root.setAttribute("data-theme", activeTheme);
          root.style.colorScheme = activeTheme;
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
